name: Deploy CDK Infrastructure

on:
  push:
    branches:
      - "*"
      - "!skipci*"
      - "!code-json-*"
      - "!snyk-*"
    paths:
      - "cdk/**"
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage to deploy'
        required: true
        default: 'dev'
        type: string

concurrency:
  group: cdk-${{ inputs.stage || github.ref_name }}-group
  cancel-in-progress: false

env:
  STAGE_NAME: ${{ inputs.stage || github.ref_name }}
  PROJECT: seatool
  REGION_A: us-east-1

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate stage name
        run: |
          if [[ ! $STAGE_NAME =~ ^[a-z][a-z0-9-]*$ ]]; then
              echo "ERROR: Your stage name, $STAGE_NAME, is not a valid stage name." && exit 1
          fi

  deploy-cdk:
    runs-on: ubuntu-latest
    needs:
      - validate
    environment:
      name: ${{ inputs.stage || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_TO_ASSUME }}
          aws-region: us-east-1
          role-duration-seconds: 10800

      - name: Install CDK CLI and dependencies
        run: |
          echo "Installing CDK CLI globally for reliability..."
          npm install -g aws-cdk@2.179.0
          echo "Installing CDK project dependencies..."
          yarn cdk:install
          echo "CDK CLI version:"
          cdk --version

      - name: Build CDK
        run: yarn cdk:build

      - name: CDK Bootstrap (if needed)
        run: |
          cd cdk
          # Check if bootstrap is needed by looking for the bootstrap SSM parameter
          if aws ssm get-parameter --name "/cdk-bootstrap/seatool/version" --region ${{ env.REGION_A }} >/dev/null 2>&1; then
            echo "CDK already bootstrapped with seatool qualifier"
          else
            echo "Bootstrapping CDK with custom qualifier..."
            cdk bootstrap --qualifier seatool --toolkit-stack-name CDKToolkit-seatool
          fi
        env:
          STAGE: ${{ env.STAGE_NAME }}
          PROJECT: ${{ env.PROJECT }}
          REGION_A: ${{ env.REGION_A }}

      - name: CDK Diff
        run: cd cdk && cdk diff
        env:
          STAGE: ${{ env.STAGE_NAME }}
          PROJECT: ${{ env.PROJECT }}
          REGION_A: ${{ env.REGION_A }}
        continue-on-error: true

      - name: Deploy CDK
        run: cd cdk && cdk deploy --all --require-approval never
        env:
          STAGE: ${{ env.STAGE_NAME }}
          PROJECT: ${{ env.PROJECT }}
          REGION_A: ${{ env.REGION_A }}

  security-scan:
    runs-on: ubuntu-latest
    needs:
      - deploy-cdk
    environment:
      name: ${{ inputs.stage || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_TO_ASSUME }}
          aws-region: us-east-1
          role-duration-seconds: 10800

      - name: Install CDK CLI and dependencies
        run: |
          npm install -g aws-cdk@2.179.0
          yarn cdk:install

      - name: Build CDK
        run: yarn cdk:build

      - name: Generate CloudFormation templates
        run: |
          mkdir -p cdk-templates
          cd cdk
          cdk synth --output ../cdk-templates
        env:
          STAGE: ${{ env.STAGE_NAME }}
          PROJECT: ${{ env.PROJECT }}
          REGION_A: ${{ env.REGION_A }}

      - name: Stelligent cfn_nag
        uses: stelligent/cfn_nag@v0.8.6
        with:
          input_path: cdk-templates
          
  notify_of_failure:
    runs-on: ubuntu-latest
    needs:
      - deploy-cdk
      - security-scan
    if: failure()
    steps:
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        if: env.SLACK_WEBHOOK != '' && contains(fromJson('["master", "val", "production"]'), env.STAGE_NAME)
        env:
          SLACK_COLOR: ${{job.status}}
          SLACK_ICON: https://github.com/Enterprise-CMCS.png?size=48
          SLACK_TITLE: CDK Deployment Failure
          SLACK_USERNAME: ${{ github.repository }} - CDK - ${{job.status}}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }} 