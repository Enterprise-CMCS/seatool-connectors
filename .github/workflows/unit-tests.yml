name: Test Coverage

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  coverage-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: install
        run: run install
      
      - name: Run tests with coverage
        run: |
          echo "Running coverage tests..."
          yarn run coverage
          echo "Coverage command completed with exit code: $?"
      - name: Check coverage file exists
        run: |
          if [ -f ./coverage/clover.xml ]; then
            echo "Coverage file exists, checking content..."
            head -n 5 ./coverage/clover.xml
          else
            echo "Coverage file not found"
            ls -la ./coverage/ || echo "Coverage directory not found"
          fi
      
      - name: publish test coverage to code climate
        if: false  # Temporarily disabled due to CodeClimate download issues
        uses: paambaati/codeclimate-action@v6.0.0
        continue-on-error: true
        env:
          CC_TEST_REPORTER_ID: ${{ secrets.CC_TEST_REPORTER_ID }}
        with:
          coverageLocations: |
            ${{github.workspace}}/coverage/clover.xml:clover
          debug: true
