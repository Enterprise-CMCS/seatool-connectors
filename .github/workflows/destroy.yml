name: Destroy

on:
  delete:
  workflow_dispatch:
    inputs:
      environment:
        description: "Name of the environment to destroy:"
        required: true

jobs:
  destroy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    if: |
      (
        github.event.ref_type == 'branch' &&
        !startsWith(github.event.ref, 'skipci-') &&
        !startsWith(github.event.ref, 'code-json-') &&
        !startsWith(github.event.ref, 'snyk-') &&
        !contains(fromJson('["master", "val", "production"]'), github.event.ref)
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.environment != '' &&
        !startsWith(inputs.environment, 'skipci-') &&
        !startsWith(inputs.environment, 'code-json-') &&
        !startsWith(inputs.environment, 'snyk-') &&
        !contains(fromJson('["master", "val", "production"]'), inputs.environment)
      )
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and run Stage Destroyer
        run: |
          npm install -g sls-stage-destroyer
          destroy-stage "${{ inputs.environment || github.event.ref }}" \
            --no-verify \
            --no-wait \
            --retries 3 \
            --region us-east-1
        env:
          CI: true

      - name: Install CDK CLI and dependencies
        run: |
          echo "Installing CDK CLI..."
          npm install -g aws-cdk@2.179.0
          echo "Installing CDK dependencies..."
          cd cdk && npm install

      - name: Build CDK
        run: cd cdk && npm run build

      - name: List CDK stacks
        run: |
          echo "Listing CDK stacks to be destroyed:"
          cd cdk && cdk list
        env:
          STAGE: ${{ inputs.environment || github.event.ref }}
          PROJECT: seatool
          REGION_A: us-east-1

      - name: Destroy CDK Infrastructure
        run: |
          echo "Destroying CDK infrastructure for stage: ${{ inputs.environment || github.event.ref }}"
          cd cdk && cdk destroy --all --force
        env:
          STAGE: ${{ inputs.environment || github.event.ref }}
          PROJECT: seatool
          REGION_A: us-east-1

      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        if: env.SLACK_WEBHOOK != '' && failure()
        env:
          SLACK_COLOR: ${{job.status}}
          SLACK_ICON: https://github.com/Enterprise-CMCS.png?size=48
          SLACK_TITLE: Failure
          SLACK_USERNAME: ${{ github.repository }} ${{job.status}}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

  delete_environment:
    runs-on: ubuntu-latest
    needs: destroy
    if: always()
    steps:
      - name: Delete Environment
        uses: strumwolf/delete-deployment-environment@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ inputs.environment || github.event.ref }}
          ref: ${{ github.ref }}
